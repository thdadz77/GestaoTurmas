<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <!-- Responsive Meta Tag -->
    <meta name="viewport" content=" width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../favicon.png">
    <title>AULA 01 JAVASCRIPT</title>
    <meta name="description" content="Aplicação para..;">
    <meta name="keywords" content="Aplicação para..;">
    <meta name="author" content="Aplicação para..;">
</head>

<body>
    <h1><mark>MANIPULANDO ELEMENTOS (TAGS) DO HTML ATRAVÉS DO JS</mark></h1>
    <hr>
    <div>
        <p>EU AMO ACADEMIA</p>
        <hr>
        <p>EU AMO MEU AMO</p>
        <p>EU AMO DORMIR COM MEU AMOR</p>
    </div>
    <script>
        const tags_p = document.getElementsByTagName('p');
        console.log(tags_p);
        let tag_p_1 = tags_p[0];

        tag_p_1.style.backgroundColor="GREEN";
        tag_p_1.style.color="RED";
        tag_p_1.style.fontSize="20pt";
        tag_p_1.style.textAlign="center";

        let tag_p_2 = tags_p[1];
        tag_p_2.style.backgroundColor="YELLOW";
        tag_p_2.style.color="GREEN";
        tag_p_2.style.fontSize="20pt";
        tag_p_2.style.textAlign="center";
       
        let tag_p_3 = tags_p[2];
        tag_p_3.style.backgroundColor="RED";
        tag_p_3.style.color="YELLOW";
        tag_p_3.style.fontSize="20pt";
        tag_p_3.style.textAlign="center";
    </script>
   
</body>

</html>
