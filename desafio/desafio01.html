<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="favicon.png">
    <title>Desafio 1 - javascript </title>
    <meta name="description" content="Aplicação para ajudar encontrar animais">
    <meta name="keywords" content="Aplicação para ajudar encontrar animais">

</head>
<body>
    <h1>Soma de dois números</h1>
    <hr>
    <script>
     let num1 = parseFloat(window.prompt)("digite o primeiro numero");
     let num2 = parseFloat(window.prompt)("digite o segundo numero");
     let operacao = window.prompt("Qual operacao quer realizar? + ou -")
     let resultado = 0

     if (operacao =="+" ){
        resultado = num1 + num2
     } else{
        resultado = num1 - num2
     }
     window.alert(resultado); 


    </script>
</body>


</html>
